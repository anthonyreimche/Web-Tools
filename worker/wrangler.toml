name = "swt-worker"
main = "src/index.js"
compatibility_date = "2024-09-01"

# One KV namespace holds everything (manifests, tokens, decisions, images).
# `npm run deploy-worker` creates it and fills in the id below automatically.
[[kv_namespaces]]
binding = "DECISIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets (the deploy script sets WRITE_KEY for you):
#   WRITE_KEY        the key the Safelight extension uses to upload + read decisions
#   RESEND_API_KEY   optional — email notifications
#   NOTIFY_EMAIL     optional — where "client decided" emails go
#   NOTIFY_FROM      optional — verified Resend sender
